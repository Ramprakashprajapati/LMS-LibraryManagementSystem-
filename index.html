<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Library System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>📚 Smart Library Management System</h1>
</header>

<!-- 🔥 Stats -->
<div class="stats">
  <div>Total Capacity: <span id="capacity">100</span></div>
  <div>Total Books: <span id="totalBooks">0</span></div>
  <div>Available Slots: <span id="slots">100</span></div>
</div>

<div class="container">

  <!-- Add Book -->
  <div class="card">
    <h2>Add Book</h2>
    <input type="text" id="title" placeholder="Book Title">
    <input type="text" id="author" placeholder="Author">
    <input type="text" id="isbn" placeholder="ISBN">
    <button onclick="addBook()">Add Book</button>
  </div>

  <!-- Issue Book -->
  <div class="card">
    <h2>Issue Book</h2>
    <select id="bookSelect"></select>
    <input type="text" id="student" placeholder="Student ID">
    <input type="date" id="issueDate">
    <input type="date" id="returnDate">
    <button onclick="issueBook()">Issue</button>
  </div>

  <!-- Books -->
  <div class="card">
    <h2>Available Books</h2>
    <ul id="bookList"></ul>
  </div>

  <!-- Issued -->
  <div class="card">
    <h2>Issued Books</h2>
    <table>
      <thead>
        <tr>
          <th>Book</th>
          <th>Student</th>
          <th>Issue</th>
          <th>Return</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="issuedList"></tbody>
    </table>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
